site_name: Crawlo Documentation
site_url: https://crawlo.readthedocs.io/
site_description: 一个基于 asyncio 的现代化、高性能异步爬虫框架
site_author: Crawlo Team

repo_url: https://github.com/crawl-coder/Crawlo
edit_uri: ""

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - 简介: index.md
  - 🔰 新手手把手教程: beginner-tutorial.md
  - 快速入门: getting-started.md
  - 🏗️ 核心架构: architecture.md
  - 🛠️ 核心组件: core-components.md
  - ⚙️ 参数配置详解: configuration.md
  - 💡 实战案例库: examples.md
  - 高级特性: advanced-features.md
  - 命令行参考: cli-reference.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
