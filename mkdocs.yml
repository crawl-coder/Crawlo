site_name: Crawlo Documentation
site_url: https://crawlo.readthedocs.io/
site_description: An asynchronous distributed web crawling framework
site_author: Crawlo Team

repo_url: https://github.com/crawl-coder/Crawlo
edit_uri: ""

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

nav:
  - 首页: 
    - 简介: index.md
    - 快速开始: getting_started/quick_start.md
    - 安装指南: getting_started/installation.md
  - 核心概念:
    - 框架架构: core_concepts/framework_architecture.md
    - 运行模式: core_concepts/execution_modes.md
    - 项目结构: core_concepts/project_structure.md
    - 配置系统: core_concepts/configuration_system.md
  - 开发指南:
    - 爬虫开发: development_guide/spider_development.md
    - 数据项定义: development_guide/item_definitions.md
    - 请求和响应: development_guide/requests_responses.md
    - 中间件: development_guide/middleware.md
    - 管道: development_guide/pipelines.md
    - 扩展组件: development_guide/extensions.md
    - 过滤器: development_guide/filters.md
    - 下载器: development_guide/downloaders.md
    - 调度器: development_guide/scheduler.md
    - 队列: development_guide/queues.md
  - 高级主题:
    - 分布式爬取: 
      - 分布式机制: advanced_topics/distributed_crawling/mechanism.md
      - 分布式模式: advanced_topics/distributed_crawling/patterns.md
      - 分布式教程: advanced_topics/distributed_crawling/tutorial.md
    - 性能优化: advanced_topics/performance.md
    - 调试技巧: advanced_topics/debugging.md
    - 部署指南: advanced_topics/deployment.md
    - 环境变量: advanced_topics/environment_variables.md
    - Redis Key 命名规范: advanced_topics/redis_key_naming.md
  - 配置参考:
    - 配置最佳实践: configuration_reference/best_practices.md
    - 去重配置: configuration_reference/deduplication.md
    - 去重管道指南: configuration_reference/deduplication_pipelines.md
  - API 参考:
    - 核心 API: api_reference/core.md
    - 爬虫 API: api_reference/spider.md
    - 网络 API: api_reference/network.md
    - 队列 API: api_reference/queue.md
    - 过滤器 API: api_reference/filter.md
    - 中间件 API: api_reference/middleware.md
    - 管道 API: api_reference/pipeline.md
    - 扩展 API: api_reference/extension.md
    - 工具 API: api_reference/utility.md
  - 示例项目:
    - 单机爬虫示例: examples/standalone.md
    - 分布式爬虫示例: examples/distributed.md
  - 故障排除:
    - 常见问题: troubleshooting/faq.md
    - 错误处理: troubleshooting/error_handling.md
    - 性能问题: troubleshooting/performance_issues.md
  - 贡献指南:
    - 开发环境设置: contribution/development_setup.md
    - 代码规范: contribution/code_standards.md
    - 测试指南: contribution/testing.md
    - 文档贡献: contribution/documentation.md

