site_name: Crawlo Documentation
site_url: https://crawlo.readthedocs.io/
site_author: crawl-coder
site_description: Crawlo is a modern, high-performance Python asynchronous web scraping framework.

# Repository
repo_name: crawl-coder/Crawlo
repo_url: https://github.com/crawl-coder/Crawlo

# Copyright
copyright: Copyright &copy; 2025 crawl-coder

# Configuration
theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share

# Plugins
plugins:
  - search

# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/crawl-coder/Crawlo

# Extensions
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences

# Navigation
nav:
  - Home: 
      - index.md
      - index_zh.md
  - Getting Started:
      - Quick Start Guide: quick_start_guide.md
      - 快速入门指南: quick_start_guide_zh.md
      - Framework Documentation: crawlo_framework_documentation.md
      - 框架完整文档: crawlo_framework_documentation_zh.md
  - Core Features:
      - API Reference: api_reference.md
      - API 参考: api_reference_zh.md
      - Distributed Crawling Tutorial: distributed_crawling_tutorial.md
      - 分布式爬取教程: distributed_crawling_tutorial_zh.md
      - Distributed Patterns: distributed_crawling_patterns.md
      - 分布式模式详解: distributed_crawling_patterns_zh.md
      - Configuration Best Practices: configuration_best_practices.md
      - 配置最佳实践: configuration_best_practices_zh.md
  - Examples:
      - Overview: ../examples/README.md
      - 项目概述: ../examples/README.md
      - Standalone Example: ../examples/telecom_licenses_standalone/README.md
      - 单机版示例: ../examples/telecom_licenses_standalone/README.md
      - Distributed Example: ../examples/telecom_licenses_distributed/README.md
      - 分布式示例: ../examples/telecom_licenses_distributed/README.md