site_name: Crawlo Documentation
site_url: https://crawlo.readthedocs.io/
site_description: 一个基于 asyncio 的现代化、高性能异步爬虫框架
site_author: Crawlo Team
docs_dir: docs
site_dir: site

repo_url: https://github.com/crawl-coder/Crawlo
repo_name: crawl-coder/Crawlo
edit_uri: edit/master/docs/
copyright: Copyright &copy; 2024 Crawlo Team

theme:
  name: material
  language: zh
  
  # 自定义主题颜色
  palette:
    # 浅色模式 - 使用蓝色主题
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式 - 使用深蓝灰色
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  
  # 字体配置
  font:
    text: Roboto
    code: Roboto Mono
  
  # Logo 和图标
  logo: assets/logo.svg
  favicon: assets/logo.svg
  
  # 功能增强
  features:
    # 导航增强
    - navigation.tabs
    - navigation.tabs.sticky  # 固定顶部导航栏
    - navigation.sections
    - navigation.expand  # 默认展开所有分组
    - navigation.indexes  # 支持分组索引页
    - navigation.top  # 返回顶部按钮
    - navigation.path  # 显示导航路径
    - navigation.prune  # 性能优化，只渲染当前页面
    
    # 目录增强
    - toc.integrate
    - toc.follow  # 侧边栏自动跟随
    
    # 搜索增强
    - search.suggest
    - search.highlight
    - search.share  # 分享搜索结果
    
    # 代码增强
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.code.select  # 支持选择代码
    
    # 其他增强
    - header.autohide  # 自动隐藏头部
    - announce.dismiss  # 允许关闭公告
    
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/light-bulb-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

