site_name: Crawlo Documentation
site_url: https://crawlo.readthedocs.io/
site_description: An asynchronous distributed web crawling framework
site_author: Crawlo Team

repo_url: https://github.com/crawl-coder/Crawlo
edit_uri: ""

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

nav:
  - 首页: 
    - 简介: README.md
  - 模块文档:
    - 首页: 
      - 中文: modules/index.md
      - English: modules/index_en.md
    - 核心模块 (Core): 
      - 概述: 
        - 中文: modules/core/index.md
        - English: modules/core/index_en.md
      - 引擎 (Engine): 
        - 中文: modules/core/engine.md
        - English: modules/core/engine_en.md
      - 调度器 (Scheduler): 
        - 中文: modules/core/scheduler.md
        - English: modules/core/scheduler_en.md
      - 处理器 (Processor): 
        - 中文: modules/core/processor.md
        - English: modules/core/processor_en.md
      - startproject 命令:
        - 中文: modules/core/cli_startproject.md
        - English: modules/core/cli_startproject_en.md
    - 下载器模块 (Downloader):
      - 概述: 
        - 中文: modules/downloader/index.md
        - English: modules/downloader/index_en.md
      - AioHttpDownloader: 
        - 中文: modules/downloader/aiohttp.md
        - English: modules/downloader/aiohttp_en.md
      - HttpXDownloader: 
        - 中文: modules/downloader/httpx.md
        - English: modules/downloader/httpx_en.md
      - CurlCffiDownloader: 
        - 中文: modules/downloader/curl_cffi.md
        - English: modules/downloader/curl_cffi_en.md
    - 中间件模块 (Middleware):
      - 概述: 
        - 中文: modules/middleware/index.md
        - English: modules/middleware/index_en.md
      - MiddlewareManager: 
        - 中文: modules/middleware/manager.md
        - English: modules/middleware/manager_en.md
      - 内置中间件: 
        - 中文: modules/middleware/built_in.md
        - English: modules/middleware/built_in_en.md
    - 管道模块 (Pipeline):
      - 概述: 
        - 中文: modules/pipeline/index.md
        - English: modules/pipeline/index_en.md
      - PipelineManager: 
        - 中文: modules/pipeline/manager.md
        - English: modules/pipeline/manager_en.md
      - 内置管道: 
        - 中文: modules/pipeline/built_in.md
        - English: modules/pipeline/built_in_en.md
    - 队列模块 (Queue):
      - 概述: 
        - 中文: modules/queue/index.md
        - English: modules/queue/index_en.md
      - QueueManager: 
        - 中文: modules/queue/manager.md
        - English: modules/queue/manager_en.md
      - 内存队列: 
        - 中文: modules/queue/memory.md
        - English: modules/queue/memory_en.md
      - Redis队列: 
        - 中文: modules/queue/redis.md
        - English: modules/queue/redis_en.md
    - 过滤器模块 (Filter):
      - 概述: 
        - 中文: modules/filter/index.md
        - English: modules/filter/index_en.md
      - BaseFilter: 
        - 中文: modules/filter/base.md
        - English: modules/filter/base_en.md
      - 内存过滤器: 
        - 中文: modules/filter/memory.md
        - English: modules/filter/memory_en.md
      - Redis过滤器: 
        - 中文: modules/filter/redis.md
        - English: modules/filter/redis_en.md
    - 扩展模块 (Extension):
      - 概述: 
        - 中文: modules/extension/index.md
        - English: modules/extension/index_en.md
      - ExtensionManager: 
        - 中文: modules/extension/manager.md
        - English: modules/extension/manager_en.md
      - 内置扩展: 
        - 中文: modules/extension/built_in.md
        - English: modules/extension/built_in_en.md
  - API 参考:
    - crawlo: api/crawlo___init__.md
    - crawlo.crawler: api/crawlo_crawler.md
    - crawlo.spider: api/crawlo_spider___init__.md
    - crawlo.request: api/crawlo_network_request.md
    - crawlo.response: api/crawlo_network_response.md
    - crawlo.items: api/crawlo_items_items.md
    - crawlo.pipelines: api/crawlo_pipelines___init__.md
    - crawlo.middleware: api/crawlo_middleware___init__.md
    - crawlo.extensions: api/crawlo_extension___init__.md
    - crawlo.filters: api/crawlo_filters___init__.md
    - crawlo.downloader: api/crawlo_downloader___init__.md
    - crawlo.scheduler: api/crawlo_core_scheduler.md
    - crawlo.queues: api/crawlo_queue___init__.md
    - crawlo.utils: api/crawlo_utils_log.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/crawl-coder/Crawlo

# Extensions
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences