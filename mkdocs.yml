  - 🚀 快速开始:
    - 概览: getting-started/index.md
    - 5分钟快速上手: getting-started/5min-quickstart.md
    - 安装指南: getting-started/installation.md
    - 创建第一个爬虫: getting-started/first-spider.md
  - 📚 教程系列:
    - 概览: tutorials/index.md
  - 🖥 生产部署:
    - 概览: deployment.md
    - 部署模式详解: guides/configuration/run-modes.md
  - 🎯 使用指南:
    - 概览: guides/index.md
    - 配置指南:
      - 概览: guides/configuration/index.md
      - 运行模式详解: guides/configuration/run-modes.md
    - 自适应选择器: guides/adaptive-selector.md
    - 扩展系统: guides/extension-guide.md
    - 通知系统: guides/notification-guide.md
    - 中间件参考: concepts/middleware-reference.md
    - 代理配置: guides/proxy-guide.md
    - Cloudflare 绕过: guides/cloudflare-bypass.md
    - Helpers 工具集: guides/helpers-reference.md
    - 调度指南:
      - 定时任务调度器: guides/scheduling/scheduler.md
      - 背压系统: guides/scheduling/backpressure.md
  - 📖 核心概念:
    - 概览: concepts/index.md
    - 架构设计: concepts/architecture.md
    - 分布式架构: distributed_architecture.md
    - 核心组件: concepts/core-components.md
    - 请求生命周期: concepts/request-lifecycle.md
    - 爬虫生命周期: concepts/spider-lifecycle.md
    - 中间件链: concepts/middleware-chain.md
    - 错误处理机制: concepts/error-handling.md
    - 检查点系统: concepts/checkpoint-guide.md
  - 🔧 API参考:
    - 概览: reference/index.md
    - 命令行参考: reference/cli-reference.md
  - 💡 实战案例:
    - 概览: examples/index.md
    - 基础示例: examples/basic-examples.md
  - ❓ 常见问题:
    - 概览: faq/index.md
    - 一般问题: faq/general.md
    - 安装问题: faq/installation.md
    - 配置问题: faq/configuration.md
    - 性能问题: faq/performance.md
    - 故障排查: faq/troubleshooting.md
  - 🔄 迁移指南:
    - 概览: migration/index.md
    - Curl转换: migration/curl-conversion.md

plugins:
  - search:
      lang: 
        - zh
        - en
      separator: '[\s\u200b\-]+'
  # 可选：生成站点地图（需要安装 mkdocs-git-revision-date-localized-plugin）
  # - git-revision-date-localized:
  #     enable_creation_date: true
  #     type: timeago
  #     locale: zh
  # 可选：自动修复死链（需要安装 mkdocs-literate-nav）
  # - literate-nav:
  #     nav_file: NAV.md

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      permalink_title: 永久链接
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  
  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - docs/.icons
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: crawl-coder
      repo: Crawlo
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true

